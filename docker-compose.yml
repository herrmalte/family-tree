services:
  app:
    build: .
    image: family-tree:latest
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/family_tree.db
      - DATA_DIR=/app/data
      - FACE_BACKEND=insightface
      # buffalo_s ≈ 17 MB. Swap to buffalo_l (~326 MB) for best accuracy.
      - FACE_MODEL=buffalo_s
      - AUTO_MATCH_THRESHOLD=0.80
      - SUGGEST_THRESHOLD=0.45
    volumes:
      - ./data:/app/data
      # Cache InsightFace model downloads so the container doesn't re-fetch on restart.
      - insightface_models:/root/.insightface
    restart: unless-stopped

volumes:
  insightface_models:
