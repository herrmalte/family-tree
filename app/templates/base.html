<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Family Tree Photo Archive{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">Family Archive</a>
    <nav class="nav">
      <a href="/gallery">Gallery</a>
      <a href="/upload">Upload</a>
      <a href="/people">People</a>
      <a href="/tree">Tree</a>
      <a href="/faces/seed">Seed faces</a>
      <a href="/faces/review">Review</a>
      <a href="/faces/unidentified">Unidentified</a>
      <a href="/search">Search</a>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <span>Self-hosted family tree archive.</span>
  </footer>
</body>
</html>
